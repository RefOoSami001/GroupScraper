<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Code Finder</title>
    <!-- Include Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Include Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        /* General Styles */
        body {
            margin: 0;
            overflow: auto;
            height: 100vh;
            background: linear-gradient(135deg, #e7ecf1, #d1d9e6);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            font-size: 2rem;
            margin-bottom: 25px;
            color: #007bff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* Particles.js Background */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }

        /* Container Layout */
        .container {
            display: flex;
            justify-content: space-between;
            padding: 30px;
            margin-left: 0;
        }

        /* Form Container */
        .form-container {
            width: 500px;
            padding: 25px;
            border-radius: 15px;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease;
        }

        .form-container:hover {
            transform: translateY(-5px);
        }

        /* Table Container */
        .table-container {
            width: calc(100% - 500px);
            margin-left: 520px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            overflow-y: auto;
        }

        /* Table Styles */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
        }

        table th, table td {
            padding: 12px;
            text-align: left;
            border: 1px solid #dee2e6;
        }

        table th {
            background-color: #007bff;
            color: white;
            font-weight: 600;
        }

        table tr:nth-child(even) {
            background-color: #f8f9fa;
        }

        table tr:hover {
            background-color: #e9ecef;
            transition: background-color 0.3s ease;
        }

        /* Buttons */
        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #004085;
            transform: translateY(-2px);
        }

        .btn-danger {
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
        }

        /* Loading Indicator */
        .loading-indicator {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #007bff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                padding: 15px;
                align-items: center; /* Center items vertically */
            }

            .form-container {
                width: 90%; /* Take up 90% of the screen width */
                position: relative; /* Remove fixed positioning */
                top: auto;
                left: auto;
                margin: 20px auto; /* Center the form */
                padding: 20px;
            }

            .table-container {
                width: 90%; /* Take up 90% of the screen width */
                margin-left: 0;
                margin-top: 20px;
                padding: 15px;
                overflow-x: auto; /* Allow horizontal scrolling for tables */
            }

            table {
                min-width: 600px; /* Ensure table has a minimum width */
            }

            h1 {
                font-size: 1.5rem; /* Smaller font size for mobile */
            }

            .btn-primary {
                padding: 12px; /* Increase button padding for easier tap */
            }

            table th, table td {
                padding: 8px; /* Reduce padding for better mobile experience */
            }
        }

        @media (max-width: 480px) {
            .form-container {
                width: 100%; /* Full width on very small screens */
                padding: 15px;
            }

            .table-container {
                width: 100%; /* Full width on very small screens */
                padding: 10px;
            }

            table th, table td {
                font-size: 14px; /* Reduce font size in the table */
            }

            h1 {
                font-size: 1.3rem; /* Even smaller font size for very small screens */
            }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div class="container mt-5">
        <!-- Form Section -->
        <div class="form-container">
            <h1 class="text-center mb-4">Verification Code Finder</h1>
            <form method="POST" action="{{ url_for('verification_code_finder') }}" onsubmit="showLoading()">
                <div class="logout-btn-container mt-4">
                    <a href="{{ url_for('logout') }}" class="btn btn-danger">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
                <div class="mb-3">
                    <label for="numbers" class="form-label">Phone Numbers (space-separated)</label>
                    <textarea id="numbers" name="numbers" class="form-control" rows="8" required></textarea>
                </div>
                <label for="api-select" class="form-label">Select API to Use:</label>
                <div class="mb-3">
                    <select id="api-select" name="api" class="form-select" required>
                        <option value="" disabled selected>Select an API</option>
                        <option value="+221">+221</option>
                        <option value="+502">+502</option>
                        <option value="+996\+855">+996\+855</option>
                        <option value="+260">+260</option>
                        <option value="Kyrgyzstan">Kyrgyzstan</option>
                        <option value="Angola">Angola</option>
                        <option value="+856">+856</option>
                        <option value="+60">+60</option>
                        <option value="+966">+966</option>
                        <option value="+31">+31</option>
                        <option value="Netherlands">Netherlands</option>
                        <option value="+507">+507</option>
                        <option value="+44">+44</option>
                        <option value="Iraq">Iraq</option>
                        <option value="+591">+591</option>
                        <option value="PANAMA">PANAMA</option>
                    </select>
                    <div class="mb-3" id="phpsessid-field" style="display: none;">
                        <label for="phpsessid" class="form-label">PHPSESSID</label>
                        <input type="text" id="phpsessid" name="phpsessid" class="form-control" placeholder="Enter PHPSESSID">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-download"></i> Get Data
                </button>
                <div class="loading-indicator" id="loadingIndicator">
                    <div class="loading-spinner"></div>
                    <p class="mt-2">Loading...</p>
                </div>
            </form>
        </div>

        <!-- Table Section -->
        {% if results %}
        <div class="table-container">
            <div class="info-container mb-3">
                <div class="info-item">
                    <strong>Total Success:</strong> {{ results['total_success'] }}
                </div>
                <div class="info-item">
                    <strong>Total Fail:</strong> {{ results['total_fail'] }}
                </div>
                <div class="info-item">
                    <strong>Date:</strong> {{ results['date'] }}
                </div>
            </div>
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Phone Number</th>
                        <th>Code</th>
                    </tr>
                </thead>
                <tbody>
                    {% for number, code in results['codes'].items() %}
                        <tr>
                            <td>{{ number }}</td>
                            <td>{{ code }}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% endif %}
    </div>

    <!-- Include Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Initialize Particles.js -->
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const apiSelect = document.getElementById('api-select');
            const phpsessidField = document.getElementById('phpsessid-field');

            apiSelect.addEventListener('change', function () {
                if (apiSelect.value === '9' || apiSelect.value === '14') {
                    phpsessidField.style.display = 'block';
                } else {
                    phpsessidField.style.display = 'none';
                }
            });
        });

        // Show loading indicator on form submission
        function showLoading() {
            const loadingIndicator = document.getElementById('loadingIndicator');
            loadingIndicator.style.display = 'block';
        }
    </script>
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": {
                    "value": 100,
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": ["#007bff", "#00ff00", "#ff0000", "#ffff00", "#ff00ff", "#00ffff"]
                },
                "shape": {
                    "type": "circle",
                    "stroke": {
                        "width": 0,
                        "color": "#000000"
                    }
                },
                "opacity": {
                    "value": 0.6,
                    "anim": {
                        "enable": true,
                        "speed": 1,
                        "opacity_min": 0.3
                    }
                },
                "size": {
                    "value": 4,
                    "random": true
                },
                "move": {
                    "enable": true,
                    "speed": 1,
                    "direction": "bottom",
                    "random": false,
                    "straight": false,
                    "out_mode": "out"
                }
            },
            "interactivity": {
                "events": {
                    "onhover": {
                        "enable": false
                    },
                    "onclick": {
                        "enable": false
                    }
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
